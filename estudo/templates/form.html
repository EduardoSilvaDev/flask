<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="row col-1 m-3 ">
        <div class="text-center"></div>
            <a href="{{ url_for('homepage') }}" class="btn btn-primary">Página Inicial</a>
        </div>
    </div>
    
    <div class="container">
        <div class="row">
            <h3>Envio de Contato</h3>
        </div>
        
        <form action="" method="post" class="row mt-4">
            {{ form.csrf_token }}

            {{ form.nome.label() }}
            {{ form.nome() }}

            {{ form.email.label() }}
            {{ form.email() }}
            
            {{ form.assunto.label() }}
            {{ form.assunto() }}
            
            {{ form.mensagem.label() }}
            {{ form.mensagem() }}

            {{ form.btnSubmit() }}

            
        </form>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
