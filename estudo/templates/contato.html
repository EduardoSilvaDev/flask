<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row mt-4">
            <h3>Formulário GET</h3>
        </div>
        <form action="" method="get" class="row mt-4">
            <div class="col-9">
                Digite algo para pesquisar
                <input class="col-12 mt-1" type="text" name="pesquisa" id="form-control">
            </div>
            <div class="col-3">
                <button class="btn btn-primary mt-4 col-12" type="submit">Pesquisar</button>
            </div> 
        </form>

        <p>Você pesquisou: {{context['pesquisa']}}</p>
            
        <hr><hr>
        <div class="row">
            <h3>Formulário POST</h3>
        </div>
        
        <form action="" method="post" class="row mt-4">
            <div class="col-6">
                Nome
                <input class="mt-1 col-12" type="text" name="name" id="form-control" required>
            </div>
            <div class="col-6">
                E-mail
                <input class="mt-1  col-12" type="email" name="email" id="form-control" required>
            </div>
            <div class="col-12">
                Assunto
                <input class="mt-1  col-12" type="text" name="subject" id="form-control" required>
            </div>
            <div class="col-12">
                Mensagem
                <input class="mt-1 col-12" type="text" name="message" id="form-control" required>
            </div>
            
            <div class="col-12">
                <button class="btn btn-dark mt-4 col-12" type="submit">Salvar</button>
            </div> 
        </form>


    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
